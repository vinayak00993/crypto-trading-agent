# ============================================================
# Crypto Trading Agent — Default Configuration
# ============================================================
# Copy this file to configs/config.local.yaml and edit with
# your own values. Never commit config.local.yaml to git.
# ============================================================

mode: paper                     # "paper" or "live" — start with paper!

# --- Exchange Settings ---
exchange:
  name: kraken                  # Any exchange supported by ccxt
  sandbox: false                # Kraken has no sandbox; we only read public data
  rate_limit_ms: 1200           # Minimum ms between API calls

# --- Trading Pairs ---
trading:
  pairs:
    - BTC/USDT
    - ETH/USDT
    - SOL/USDT
    - APT/USDT
  base_currency: USDT
  default_timeframe: 5m         # 5-minute candles for faster signals

# --- Strategy ---
# Multi-pod mode: runs ALL 4 strategies independently with equal capital.
# Each pod gets $2,500 (total $10,000 / 4 strategies).
# Evidence-backed: equal weights, no dynamic rebalancing.
# The params below tune each individual strategy for 5m candles.
strategy:
  name: multi_pod               # Runs sma_crossover, rsi, macd, bollinger_bands
  params:
    # SMA Crossover params (tuned for 5m candles)
    fast_period: 5
    slow_period: 15
    # RSI params (wider thresholds = more signals)
    rsi_period: 14
    rsi_oversold: 35
    rsi_overbought: 65
    # MACD params (shorter periods = faster signals)
    macd_fast: 8
    macd_slow: 21
    macd_signal: 5
    # Bollinger Bands params
    bb_period: 15
    bb_std: 2.0

# --- Risk Management (per pod) ---
risk:
  max_position_pct: 40.0        # Each pod can put up to 40% of its $2,500 in one trade
  max_open_positions: 2         # Max positions per pod (2 pairs available)
  stop_loss_pct: 2.0            # Auto stop-loss trigger (%)
  take_profit_pct: 3.0          # Auto take-profit trigger (%)
  max_daily_loss_pct: 15.0      # Kill switch per pod

# --- Paper Trading ---
paper:
  starting_balance: 20000.0     # $2,500 x 8 pods = $20,000 total

# --- Logging ---
logging:
  level: INFO                   # DEBUG, INFO, WARNING, ERROR
  format: console               # "console" (pretty) or "json" (structured)
  log_file: logs/agent.log

# --- Scheduling ---
scheduler:
  strategy_interval_seconds: 30 # Check every 30 seconds for faster trading
